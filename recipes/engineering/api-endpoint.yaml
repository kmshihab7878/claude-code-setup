version: "1.0"
title: "API Endpoint Creator"
description: "Scaffold a new API endpoint with route, handler, validation, tests, and docs"
author: "khaledshihab"
tags: ["engineering", "api", "backend"]

parameters:
  - key: name
    input_type: string
    description: "Endpoint name (e.g., create_user, get_orders)"
    requirement: required
  - key: method
    input_type: select
    description: "HTTP method"
    requirement: required
    options: ["GET", "POST", "PUT", "PATCH", "DELETE"]
  - key: path
    input_type: string
    description: "URL path (e.g., /api/v1/users)"
    requirement: required
  - key: auth_required
    input_type: boolean
    description: "Requires authentication"
    requirement: optional
    default: true

requires:
  mcp_servers: ["filesystem"]
  skills: ["api-design-patterns", "test-driven-development"]

routing:
  agent: "api-designer"
  authority: "L3"
  risk_tier: "T1"
  fallback: "backend-architect"

prompt: |
  Create a new {{ method }} {{ path }} endpoint named {{ name }}.
  Authentication: {{ auth_required }}.

  ## Steps
  1. **Analyze** existing API patterns in the codebase (routes, handlers, middleware)
  2. **Route** — add the route definition following existing patterns
  3. **Handler** — implement the handler with:
     - Input validation (Pydantic model or equivalent)
     - Business logic
     - Error handling (proper HTTP status codes)
     {% if auth_required %}
     - Authentication middleware/decorator
     {% endif %}
  4. **Tests** — write tests covering:
     - Happy path (200/201 response)
     - Validation errors (400/422)
     {% if auth_required %}
     - Unauthorized (401)
     {% endif %}
     - Not found (404) if applicable
  5. **Documentation** — add OpenAPI/docstring documentation

  ## Rules
  - Follow existing project API patterns exactly
  - Use existing validation, auth, and error handling patterns
  - Don't introduce new dependencies
  - Run tests and show output
