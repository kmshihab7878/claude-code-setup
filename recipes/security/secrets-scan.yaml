version: "1.0"
title: "Secrets Scan"
description: "Detect leaked secrets, API keys, and credentials in codebase and git history"
author: "<your-name>"
tags: ["security", "secrets", "compliance"]

parameters:
  - key: target_path
    input_type: string
    description: "Path to scan"
    requirement: required
    default: "."
  - key: scan_history
    input_type: boolean
    description: "Also scan git history for leaked secrets"
    requirement: optional
    default: false

requires:
  mcp_servers: ["filesystem"]
  skills: ["security-review"]
  cli_tools: ["gitleaks", "trivy"]

routing:
  agent: "security-auditor"
  authority: "L3"
  risk_tier: "T0"
  fallback: "code-reviewer"

prompt: |
  Scan {{ target_path }} for leaked secrets and credentials.

  ## Step 1: Gitleaks Current State
  ```bash
  gitleaks detect --source={{ target_path }} --verbose --no-git
  ```

  {% if scan_history %}
  ## Step 2: Git History Scan
  ```bash
  gitleaks detect --source={{ target_path }} --verbose
  ```
  {% endif %}

  ## Step 3: Pattern Check
  Grep for common secret patterns:
  - API keys (AKIA, sk-, pk_live, etc.)
  - Private keys (BEGIN RSA, BEGIN EC, etc.)
  - Connection strings (mongodb://, postgres://, mysql://)
  - JWT tokens (eyJ...)
  - .env files with actual values

  ## Report
  For each finding:
  1. File and line number
  2. Secret type (API key, password, token, etc.)
  3. Risk level
  4. Remediation: rotate the credential, add to .gitignore, use env vars
